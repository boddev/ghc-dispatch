name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          find tests -name '*.test.ts' -print | sort | while read -r test_file; do
            npx vitest run "$test_file"
          done

      - name: Coverage
        run: npm run test:coverage
