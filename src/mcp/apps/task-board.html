<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHC Dispatch — Task Board</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--vscode-editor-background, #1e1e1e); color: var(--vscode-foreground, #ccc); padding: 16px; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--vscode-foreground, #eee); }
    .stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .stat { background: var(--vscode-input-background, #2d2d2d); border: 1px solid var(--vscode-input-border, #444); border-radius: 6px; padding: 8px 14px; min-width: 80px; text-align: center; }
    .stat .value { font-size: 20px; font-weight: 700; }
    .stat .label { font-size: 10px; text-transform: uppercase; opacity: 0.7; }
    .board { display: flex; gap: 12px; overflow-x: auto; }
    .column { flex: 1; min-width: 200px; background: var(--vscode-sideBar-background, #252526); border-radius: 6px; padding: 10px; }
    .column-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--vscode-input-border, #444); }
    .task-card { background: var(--vscode-input-background, #2d2d2d); border: 1px solid var(--vscode-input-border, #3c3c3c); border-radius: 4px; padding: 8px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
    .task-card:hover { border-color: var(--vscode-focusBorder, #0078d4); }
    .task-title { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
    .task-meta { font-size: 10px; opacity: 0.6; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 500; }
    .badge-critical { background: #d32f2f; color: #fff; }
    .badge-high { background: #f57c00; color: #fff; }
    .badge-normal { background: #1976d2; color: #fff; }
    .badge-low { background: #616161; color: #fff; }
    .empty { font-size: 11px; opacity: 0.4; font-style: italic; text-align: center; padding: 20px; }
    .actions { margin-top: 16px; display: flex; gap: 8px; }
    button { background: var(--vscode-button-background, #0078d4); color: var(--vscode-button-foreground, #fff); border: none; border-radius: 4px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
    button:hover { background: var(--vscode-button-hoverBackground, #1a8ad4); }
    button.secondary { background: var(--vscode-button-secondaryBackground, #3a3d41); color: var(--vscode-button-secondaryForeground, #fff); }
    #approvals { margin-top: 16px; }
    .approval-card { background: #3a2a00; border: 1px solid #665500; border-radius: 4px; padding: 10px; margin-bottom: 6px; }
    .approval-actions { display: flex; gap: 6px; margin-top: 6px; }
    .btn-approve { background: #2e7d32; }
    .btn-reject { background: #c62828; }
  </style>
</head>
<body>
  <h2>🎯 GHC Dispatch</h2>

  <div class="stats" id="stats">
    <div class="stat"><div class="value" id="stat-queue">-</div><div class="label">Queued</div></div>
    <div class="stat"><div class="value" id="stat-running">-</div><div class="label">Running</div></div>
    <div class="stat"><div class="value" id="stat-completed">-</div><div class="label">Completed</div></div>
    <div class="stat"><div class="value" id="stat-failed">-</div><div class="label">Failed</div></div>
    <div class="stat"><div class="value" id="stat-sessions">-</div><div class="label">Sessions</div></div>
  </div>

  <div class="board">
    <div class="column">
      <div class="column-header">📋 Queued</div>
      <div id="col-queued"><div class="empty">No tasks</div></div>
    </div>
    <div class="column">
      <div class="column-header">🔄 Running</div>
      <div id="col-running"><div class="empty">No tasks</div></div>
    </div>
    <div class="column">
      <div class="column-header">✅ Completed</div>
      <div id="col-completed"><div class="empty">No tasks</div></div>
    </div>
    <div class="column">
      <div class="column-header">❌ Failed</div>
      <div id="col-failed"><div class="empty">No tasks</div></div>
    </div>
  </div>

  <div id="approvals"></div>

  <div class="actions">
    <button onclick="refresh()">↻ Refresh</button>
    <button class="secondary" onclick="toggleAutoRefresh()">Auto-refresh: <span id="auto-status">OFF</span></button>
  </div>

  <script>
    const API_BASE = 'http://localhost:7878/api';
    let autoRefreshId = null;

    function renderCard(task) {
      return `<div class="task-card" title="${task.id}">
        <div class="task-title">${esc(task.title)}</div>
        <div class="task-meta">
          <span class="badge badge-${task.priority}">${task.priority}</span>
          ${task.agent} · ${timeAgo(task.createdAt)}
        </div>
      </div>`;
    }

    function renderApproval(a) {
      return `<div class="approval-card">
        <div class="task-title">⚠️ ${esc(a.description)}</div>
        <div class="task-meta">Task: ${a.taskId} · Type: ${a.type} · Expires: ${new Date(a.expiresAt).toLocaleTimeString()}</div>
        <div class="approval-actions">
          <button class="btn-approve" onclick="decide('${a.id}','approve')">✓ Approve</button>
          <button class="btn-reject" onclick="decide('${a.id}','reject')">✗ Reject</button>
        </div>
      </div>`;
    }

    async function refresh() {
      try {
        const [stats, tasks, approvals] = await Promise.all([
          fetch(`${API_BASE}/stats`).then(r => r.json()),
          fetch(`${API_BASE}/tasks?limit=50`).then(r => r.json()),
          fetch(`${API_BASE}/approvals`).then(r => r.json()),
        ]);

        document.getElementById('stat-queue').textContent = stats.queue ?? 0;
        document.getElementById('stat-running').textContent = stats.running ?? 0;
        document.getElementById('stat-completed').textContent = stats.tasks?.completed ?? 0;
        document.getElementById('stat-failed').textContent = stats.tasks?.failed ?? 0;
        document.getElementById('stat-sessions').textContent = `${stats.sessions?.active ?? 0}/${(stats.sessions?.active ?? 0) + (stats.sessions?.available ?? 0)}`;

        const grouped = { queued: [], running: [], completed: [], failed: [] };
        for (const t of tasks) {
          if (grouped[t.status]) grouped[t.status].push(t);
        }

        for (const [status, list] of Object.entries(grouped)) {
          const el = document.getElementById(`col-${status}`);
          el.innerHTML = list.length ? list.map(renderCard).join('') : '<div class="empty">No tasks</div>';
        }

        const appEl = document.getElementById('approvals');
        appEl.innerHTML = approvals.length
          ? `<h2 style="margin-top:8px">⚠️ Pending Approvals (${approvals.length})</h2>` + approvals.map(renderApproval).join('')
          : '';
      } catch (e) {
        console.error('Refresh failed:', e);
      }
    }

    async function decide(id, action) {
      await fetch(`${API_BASE}/approvals/${id}/${action}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
      refresh();
    }

    function toggleAutoRefresh() {
      if (autoRefreshId) { clearInterval(autoRefreshId); autoRefreshId = null; document.getElementById('auto-status').textContent = 'OFF'; }
      else { autoRefreshId = setInterval(refresh, 3000); document.getElementById('auto-status').textContent = 'ON'; }
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function timeAgo(iso) {
      const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (s < 60) return `${s}s ago`; if (s < 3600) return `${Math.floor(s/60)}m ago`;
      return `${Math.floor(s/3600)}h ago`;
    }

    refresh();
  </script>
</body>
</html>
